<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#16224a" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E👽%3C/text%3E%3C/svg%3E" />
    <title>קרב עב״אמים</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main id="app">
      <canvas id="game-canvas" aria-label="משחק תלת ממדי עם חייזר שיורה בעבמים"></canvas>

      <header class="hud" aria-live="polite">
        <div class="mission-card">
          <span>משימה</span>
          <strong>קרב עב״אמים</strong>
        </div>

        <div class="stats-card">
          <div class="stat">
            <span>ניקוד</span>
            <strong id="score">0</strong>
          </div>
          <div class="stat">
            <span>פגיעות</span>
            <strong><b id="hits">0</b>/25</strong>
          </div>
          <div class="stat lives">
            <span>חיים</span>
            <strong id="hearts">💚💚💚💚💚💚</strong>
          </div>
          <div class="progress-shell" aria-label="התקדמות לניצחון">
            <div id="progress-bar"></div>
          </div>
        </div>
      </header>

      <div id="toast" class="toast" role="status">פגיעה!</div>
      <div id="floating-text" class="floating-text" aria-hidden="true"></div>
      <div class="objective-pill" aria-hidden="true">
        <span>ננעלים על עב״ם</span>
        <strong>החזיקו ירי כדי להפיל מטרות</strong>
      </div>

      <section id="start-screen" class="overlay active">
        <div class="intro-panel">
          <div class="mascot" aria-hidden="true">
            <span class="alien-face">👽</span>
            <span class="ufo-face">🛸</span>
            <span class="spark spark-a"></span>
            <span class="spark spark-b"></span>
            <span class="spark spark-c"></span>
          </div>
          <div class="intro-copy">
            <p class="eyebrow">משימה מיוחדת</p>
            <h1>קרב עב״אמים</h1>
            <p>
              שחקו והביסו את כל החלליות!
            </p>
            <div class="intro-actions">
              <button id="start-button" class="primary-button" type="button">יאללה מתחילים</button>
            </div>
          </div>
        </div>
      </section>

      <section id="orientation-screen" class="orientation">
        <div>
          <strong>סובבו את הטלפון לרוחב</strong>
          <span>הפקדים בנויים לאגודלים: תנועה בצד שמאל, ירי בצד ימין.</span>
        </div>
      </section>

      <section id="choice-screen" class="overlay choice-overlay">
        <div class="choice-panel">
          <p class="eyebrow">בחרו את הסגל</p>
          <h2 class="choice-title">באיזה סגל אתם?</h2>
          <div class="choice-grid">
            <button id="choice-a" class="choice-card choice-a" type="button">
              <span class="choice-eyebrow">סגל</span>
              <strong>א׳</strong>
            </button>
            <button id="choice-b" class="choice-card choice-b" type="button">
              <span class="choice-eyebrow">סגל</span>
              <strong>ב׳</strong>
            </button>
          </div>
        </div>
      </section>

      <section id="end-screen" class="overlay end-overlay">
        <div class="wheel-stage">
          <div class="wheel-pointer" aria-hidden="true"></div>
          <div id="wheel" class="wheel" aria-label="גלגל שמות"></div>
          <button id="spin-button" class="wheel-core" type="button" aria-label="סובבו את הגלגל">סובבו</button>
        </div>

        <div id="winner-reveal" class="winner-reveal" aria-hidden="true">
          <span id="winner-name">אורי</span>
          <p id="winner-message" class="winner-message">מזל טוב, את א׳ יום קרב</p>
        </div>

        <div id="fireworks" class="fireworks" aria-hidden="true"></div>

        <button id="restart-button" class="ghost-restart" type="button" aria-label="שחקו שוב">↻</button>
      </section>

      <nav id="touch-controls" class="touch-controls" aria-label="פקדי משחק">
        <div id="joystick" class="joystick" role="application" aria-label="ג׳ויסטיק תנועה">
          <div id="stick" class="stick"></div>
        </div>
        <div class="action-stack">
          <button id="shield-button" class="action-button shield-button" type="button" aria-label="מגן">
            <span class="action-glyph">🛡</span>
            <span id="shield-cd" class="cd-ring"></span>
          </button>
          <button id="grenade-button" class="action-button grenade-button" type="button" aria-label="רימון">
            <span class="action-glyph">💣</span>
            <span id="grenade-cd" class="cd-ring"></span>
          </button>
          <button id="fire-button" class="fire-button" type="button" aria-label="ירי לייזר">
            <span>ירי</span>
          </button>
        </div>
      </nav>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
